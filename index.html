<script>
const API="https://snbavhdmagfufvpiocrf.supabase.co/rest/v1/parts_public";
const TABLE_API="https://snbavhdmagfufvpiocrf.supabase.co/rest/v1/Parts";
const API_KEY="sb_publishable_PPTLw8gmtTmpbaKq_uP07Q_nWmTYSjt";
const LOW_STOCK_LIMIT=2;

let allParts=[];

function showPage(page){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document.getElementById(page)
.classList.add("active");

if(page==="mapPage"){
document.body.classList.add("map-mode");
}else{
document.body.classList.remove("map-mode");
}

if(page==="stockPage"){
showStockWarnings();
}

}

async function loadParts(){

const response=await fetch(API,{
headers:{
apikey:API_KEY,
Authorization:"Bearer "+API_KEY
}
});

allParts=await response.json();

showParts(allParts);

showStockWarnings();

}

function searchParts(){

const search=
document.getElementById("search")
.value
.toLowerCase();

showParts(

allParts.filter(part=>

JSON.stringify(part)
.toLowerCase()
.includes(search)

)

);

}

function qty(part){

return Number(part.quantity || 0);

}

function cardClass(part){

if(qty(part)<=0){
return "card critical";
}

if(qty(part)<=LOW_STOCK_LIMIT){
return "card low";
}

return "card";

}

function renderPartCard(part){

const encodedPart =
encodeURIComponent(
JSON.stringify(part)
);

return `

<div class="${cardClass(part)}">

<h2>
${part.part_name || ""}
</h2>

<p>
<b>Supplier:</b>
${part.supplier_name || ""}
</p>

<p>
<b>Part Number:</b>
${part.manufacturer_part_number || ""}
</p>

<p>
<b>Type:</b>
${part.part_type || ""}
</p>

<p class="qty">
<b>Quantity:</b>
${qty(part)}
</p>

<button
class="qty-btn"
onclick="changeQuantityFromEncoded('${encodedPart}', ${qty(part)-1})">
-
</button>

<button
class="qty-btn"
onclick="changeQuantityFromEncoded('${encodedPart}', ${qty(part)+1})">
+
</button>

<p class="location">

${part.rack ? "Rack " + part.rack : ""}

${part.shelf ? " | Shelf " + part.shelf : ""}

${part.drawer ? " | Drawer " + part.drawer : ""}

</p>

<button onclick='showMap(
${JSON.stringify(part.rack || "")},
${JSON.stringify(part.shelf || "")},
${JSON.stringify(part.drawer || "")}
)'>

View Location on Map

</button>

</div>

`;

}

function showParts(parts){

document.getElementById("results").innerHTML=

parts.map(renderPartCard)
.join("");

}

function showStockWarnings(){

const low=[...allParts]

.sort((a,b)=>qty(a)-qty(b))

.filter(part=>

qty(part)<=LOW_STOCK_LIMIT

);

document.getElementById("stockResults").innerHTML=

low.length

?

low.map(renderPartCard)
.join("")

:

`<div class="card">
<h2>No low stock items</h2>
<p>Everything is above ${LOW_STOCK_LIMIT}.</p>
</div>`;

}

function changeQuantityFromEncoded(
encodedPart,
newQty
){

const part=
JSON.parse(
decodeURIComponent(encodedPart)
);

changeQuantity(part,newQty);

}

async function changeQuantity(
part,
newQty
){

if(newQty < 0){
newQty = 0;
}

let updateUrl = "";

if(part.id){

updateUrl =
TABLE_API + "?id=eq." + part.id;

}else{

updateUrl =
TABLE_API +
"?Manufacturer%20Part%20Number=eq." +
encodeURIComponent(
part.manufacturer_part_number
);

}

const response = await fetch(updateUrl,{

method:"PATCH",

headers:{
"Content-Type":"application/json",
apikey:API_KEY,
Authorization:"Bearer " + API_KEY,
Prefer:"return=representation"
},

body:JSON.stringify({
"Quantity":Number(newQty)
})

});

if(!response.ok){

alert(
await response.text()
);

return;

}

const updated=
await response.json();

if(updated.length===0){

alert(
"No row was updated."
);

return;

}

/* UPDATE LOCAL DATA */

const index =
allParts.findIndex(p =>

(p.id && p.id === part.id)

||

(

!p.id &&

p.manufacturer_part_number ===
part.manufacturer_part_number

)

);

if(index !== -1){

allParts[index].quantity =
Number(newQty);

}

/* KEEP SEARCH */

const currentSearch =

document.getElementById("search")
.value
.toLowerCase();

if(currentSearch){

showParts(

allParts.filter(part=>

JSON.stringify(part)
.toLowerCase()
.includes(currentSearch)

)

);

}else{

showParts(allParts);

}

showStockWarnings();

}

function clearHighlights(){

document.querySelectorAll(".highlight")
.forEach(e=>
e.classList.remove("highlight")
);

}

function extractNumber(value){

const match=
String(value || "")
.match(/\d+/);

return match ? match[0] : "";

}

function showMap(
rack,
shelf,
drawer
){

showPage("mapPage");

clearHighlights();

const rackNum=
extractNumber(rack);

const shelfNum=
extractNumber(shelf);

const drawerRaw=
String(drawer || "")
.trim();

const drawerText=
drawerRaw.toLowerCase();

const drawerNum=
extractNumber(drawerText);

document.getElementById("selectedInfo").innerHTML=

`<div class="card">

<b>Selected Location</b><br>

${rackNum ? "Rack " + rackNum + " " : ""}

${shelfNum ? "Shelf " + shelfNum + " " : ""}

${drawerRaw ? "Drawer " + drawerRaw : ""}

</div>`;

const rackEl=
document.getElementById(
"rack-"+rackNum
);

const shelfEl=
document.getElementById(
"shelf-"+shelfNum
);

if(rackEl){
rackEl.classList.add("highlight");
}

if(shelfEl){
shelfEl.classList.add("highlight");
}

if(
drawerText.startsWith("l")
&& drawerNum
){

document.getElementById(
"left-drawer-main"
).classList.add("highlight");

document.getElementById(
"left-drawer-"+drawerNum
)?.classList.add("highlight");

}

if(
drawerText.startsWith("r")
&& drawerNum
){

document.getElementById(
"right-drawer-main"
).classList.add("highlight");

document.getElementById(
"right-drawer-"+drawerNum
)?.classList.add("highlight");

}

}

async function addPart(){

const newPart={

"Part Name":
document.getElementById("newPartName").value,

"Supplier Name":
document.getElementById("newSupplier").value,

"Manufacturer Part Number":
document.getElementById("newMPN").value,

"Part Type":
document.getElementById("newType").value,

"Rack":
document.getElementById("newRack").value,

"Shelf":
document.getElementById("newShelf").value,

"Drawer":
document.getElementById("newDrawer").value,

"Quantity":
Number(
document.getElementById("newQuantity").value || 0
)

};

const response=await fetch(TABLE_API,{

method:"POST",

headers:{
"Content-Type":"application/json",
apikey:API_KEY,
Authorization:"Bearer "+API_KEY
},

body:JSON.stringify(newPart)

});

if(!response.ok){

alert(
await response.text()
);

return;

}

alert("Part Added");

loadParts();

showPage("searchPage");

}

loadParts();

</script>
