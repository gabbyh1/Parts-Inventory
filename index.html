<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Workshop Inventory</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0a0a0a;
    color:white;
}

header{
    background:#111;
    padding:20px;
    border-bottom:3px solid #cc0000;
}

h1{
    margin:0;
    color:#ff2b2b;
}

nav{
    margin-top:15px;
}

nav button{
    background:#cc0000;
    border:none;
    color:white;
    padding:12px 20px;
    margin-right:10px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

nav button:hover{
    background:#ff2b2b;
}

.page{
    display:none;
    padding:20px;
}

.active{
    display:block;
}

input{
    width:100%;
    padding:18px;
    font-size:22px;
    border:none;
    border-radius:10px;
    margin-bottom:20px;
    box-sizing:border-box;
}

.card{
    background:#161616;
    border-left:6px solid #cc0000;
    padding:20px;
    margin-bottom:15px;
    border-radius:12px;
}

.card h2{
    margin-top:0;
    color:#ff4d4d;
}

.location{
    color:#00ff88;
    font-weight:bold;
}

.map-container{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
}

.workshop{
    width:900px;
    height:700px;
    background:#efefef;
    position:relative;
    border:4px solid black;
}

.box{
    position:absolute;
    border:2px solid black;
    background:#dce6f2;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-weight:bold;
    color:black;
}

.highlight{
    background:#00ff66 !important;
    animation:flash 1s infinite;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0.5;}
    100%{opacity:1;}
}

.side-panel{
    display:flex;
    flex-direction:column;
    gap:30px;
}

.shelf-box{
    width:260px;
    border:2px solid black;
    background:#dce6f2;
    color:black;
}

.shelf-title{
    background:#2d65b3;
    color:white;
    text-align:center;
    padding:10px;
    font-weight:bold;
}

.shelf{
    border-top:1px solid black;
    padding:8px;
    text-align:center;
}

.add-form{
    max-width:700px;
}

.add-form input{
    font-size:18px;
}

.add-form button{
    background:#cc0000;
    color:white;
    border:none;
    padding:15px;
    width:100%;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.add-form button:hover{
    background:#ff2b2b;
}

</style>
</head>

<body>

<header>
<h1>Workshop Inventory</h1>

<nav>
<button onclick="showPage('searchPage')">Search</button>
<button onclick="showPage('addPage')">Add Part</button>
<button onclick="showPage('mapPage')">Map View</button>
</nav>
</header>

<!-- SEARCH PAGE -->

<div id="searchPage" class="page active">

<input
id="search"
placeholder="Search parts..."
oninput="searchParts()"
/>

<div id="results"></div>

</div>

<!-- ADD PAGE -->

<div id="addPage" class="page">

<h2>Add New Part</h2>

<div class="add-form">

<input id="newPartName" placeholder="Part Name">
<input id="newSupplier" placeholder="Supplier">
<input id="newMPN" placeholder="Manufacturer Part Number">
<input id="newType" placeholder="Part Type">
<input id="newRack" placeholder="Rack">
<input id="newShelf" placeholder="Shelf">
<input id="newQuantity" placeholder="Quantity">

<button onclick="addPart()">Add Part</button>

</div>

</div>

<!-- MAP PAGE -->

<div id="mapPage" class="page">

<h2>Workshop Map</h2>

<div class="map-container">

<div class="workshop">

<!-- TOP RACKS -->

<div class="box rack" id="Rack 13"
style="top:40px;left:40px;width:260px;height:70px;">
Rack 13
</div>

<div class="box rack" id="Rack 14"
style="top:40px;left:300px;width:260px;height:70px;">
Rack 14
</div>

<div class="box rack" id="Rack 15"
style="top:40px;left:560px;width:260px;height:70px;">
Rack 15
</div>

<div class="box rack" id="Rack 16"
style="top:110px;left:40px;width:260px;height:70px;">
Rack 16
</div>

<div class="box rack" id="Rack 17"
style="top:110px;left:300px;width:260px;height:70px;">
Rack 17
</div>

<div class="box rack" id="Rack 18"
style="top:110px;left:560px;width:260px;height:70px;">
Rack 18
</div>

<!-- DRAWERS -->

<div class="box"
style="top:240px;left:-10px;width:70px;height:160px;writing-mode:vertical-rl;">
Right Drawer
</div>

<div class="box"
style="top:430px;left:-10px;width:70px;height:160px;writing-mode:vertical-rl;">
Left Drawer
</div>

<!-- CUPBOARD -->

<div class="box rack" id="Cupboard 1"
style="bottom:60px;left:40px;width:280px;height:60px;">
Cupboard 1
</div>

<!-- BENCH -->

<div class="box"
style="top:400px;left:180px;width:350px;height:130px;background:#ddd9cf;">
Bench
</div>

<div class="box"
style="top:530px;left:390px;width:140px;height:160px;background:#ddd9cf;">
</div>

<!-- RACK 19 -->

<div class="box rack" id="Rack 19"
style="bottom:60px;right:60px;width:280px;height:60px;">
Rack 19
</div>

</div>

<!-- RIGHT PANELS -->

<div class="side-panel">

<div class="shelf-box">

<div class="shelf-title">Rack Shelves</div>

<div class="shelf" id="Shelf 1">Shelf 1</div>
<div class="shelf" id="Shelf 2">Shelf 2</div>
<div class="shelf" id="Shelf 3">Shelf 3</div>
<div class="shelf" id="Shelf 4">Shelf 4</div>
<div class="shelf" id="Shelf 5">Shelf 5</div>
<div class="shelf" id="Shelf 6">Shelf 6</div>

</div>

</div>

</div>

</div>

<script>

const API =
"https://snbavhdmagfufvpiocrf.supabase.co/rest/v1/parts_public"

const API_KEY =
"sb_publishable_PPTLw8gmtTmpbaKq_uP07Q_nWmTYSjt"

let allParts = []

function showPage(page){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"))

document.getElementById(page)
.classList.add("active")

}

async function loadParts(){

const response = await fetch(API,{
headers:{
apikey:API_KEY,
Authorization:"Bearer " + API_KEY
}
})

const data = await response.json()

allParts = data

showParts(allParts)

}

function searchParts(){

const search =
document.getElementById("search")
.value
.toLowerCase()

const filtered = allParts.filter(part =>

(part.part_name || "")
.toLowerCase()
.includes(search)

||

(part.manufacturer_part_number || "")
.toLowerCase()
.includes(search)

||

(part.supplier_name || "")
.toLowerCase()
.includes(search)

)

showParts(filtered)

}

function showParts(parts){

document.getElementById("results").innerHTML =

parts
.filter(part =>

part.rack !== "Unknown" &&
part.shelf !== "Unknown"

)

.map(part => `

<div class="card">

<h2>${part.part_name || ""}</h2>

<p><b>Supplier:</b> ${part.supplier_name || ""}</p>

<p><b>MPN:</b> ${part.manufacturer_part_number || ""}</p>

<p><b>Type:</b> ${part.part_type || ""}</p>

<p><b>Quantity:</b> ${part.quantity || ""}</p>

<p class="location">
${part.rack || ""}
-
${part.shelf || ""}
</p>

<button onclick="
showMap(
'${part.rack}',
'${part.shelf}'
)
">
View Location on Map
</button>

</div>

`).join("")

}

function clearHighlights(){

document
.querySelectorAll(".highlight")
.forEach(el=>el.classList.remove("highlight"))

}

function showMap(rack,shelf){

showPage("mapPage")

clearHighlights()

const rackElement =
document.getElementById(rack)

const shelfElement =
document.getElementById(shelf)

if(rackElement){

rackElement.classList.add("highlight")

}

if(shelfElement){

shelfElement.classList.add("highlight")

}

}

async function addPart(){

const newPart = {

part_name:
document.getElementById("newPartName").value,

supplier_name:
document.getElementById("newSupplier").value,

manufacturer_part_number:
document.getElementById("newMPN").value,

part_type:
document.getElementById("newType").value,

rack:
document.getElementById("newRack").value,

shelf:
document.getElementById("newShelf").value,

quantity:
document.getElementById("newQuantity").value

}

await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json",
apikey:API_KEY,
Authorization:"Bearer " + API_KEY
},

body:JSON.stringify(newPart)

})

alert("Part Added")

loadParts()

showPage("searchPage")

}

loadParts()

</script>

</body>
</html>
