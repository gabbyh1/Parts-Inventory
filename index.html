<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop Inventory</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

header{
background:#111;
border-bottom:4px solid #cc0000;
padding:12px;
}

h1{
margin:0;
color:#ff2b2b;
font-size:26px;
}

nav{
margin-top:10px;
}

nav button{
background:#cc0000;
border:none;
color:white;
padding:11px;
margin:4px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.page{
display:none;
padding:12px;
}

.active{
display:block;
}

input{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:10px;
margin-bottom:15px;
box-sizing:border-box;
}

.card{
background:#161616;
border-left:6px solid #cc0000;
padding:14px;
margin-bottom:12px;
border-radius:12px;
}

.card h2{
margin-top:0;
color:#ff4d4d;
}

.location{
color:#00ff88;
font-weight:bold;
}

.card button,
.add-form button{
background:#cc0000;
border:none;
color:white;
padding:12px;
border-radius:8px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

.map-wrap{
width:100%;
display:flex;
justify-content:center;
align-items:flex-start;
overflow:hidden;
}

.map-container{
display:flex;
gap:20px;
align-items:flex-start;
transform-origin:top center;
}

.workshop{
width:720px;
height:560px;
background:#efefef;
border:4px solid black;
position:relative;
flex-shrink:0;
}

.box{
position:absolute;
border:2px solid black;
background:#dce6f2;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:black;
font-weight:bold;
font-size:14px;
transition:0.3s;
}

.highlight{
background:#00ff55 !important;
box-shadow:0 0 25px #00ff55;
animation:flash 1s infinite;
}

@keyframes flash{
0%{opacity:1}
50%{opacity:.45}
100%{opacity:1}
}

.side-panel{
display:flex;
flex-direction:column;
gap:18px;
width:260px;
flex-shrink:0;
}

.shelf-box{
background:#dce6f2;
border:2px solid black;
color:black;
}

.shelf-title{
background:#2d65b3;
color:white;
text-align:center;
padding:8px;
font-weight:bold;
}

.shelf,
.drawer-row{
border-top:1px solid black;
padding:8px;
text-align:center;
transition:0.3s;
}

/* PHONE VIEW - FITS FULL MAP WITHOUT SCROLLING */
@media(max-width:700px){

body{
overflow:hidden;
}

header{
padding:8px;
}

h1{
font-size:18px;
}

nav{
margin-top:6px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:4px;
}

nav button{
font-size:11px;
padding:8px 4px;
margin:0;
border-radius:6px;
}

.page{
padding:6px;
}

#mapPage{
height:calc(100vh - 78px);
overflow:hidden;
}

#mapPage h2{
display:none;
}

#selectedInfo{
font-size:10px;
}

#selectedInfo .card{
padding:6px;
margin-bottom:4px;
font-size:10px;
}

.map-wrap{
height:calc(100vh - 135px);
overflow:hidden;
display:flex;
justify-content:center;
align-items:flex-start;
}

.map-container{
transform:scale(0.32);
transform-origin:top center;
}

.card{
padding:10px;
font-size:14px;
}

.card h2{
font-size:18px;
}

input{
font-size:16px;
padding:14px;
}

}

/* SMALLER PHONES */
@media(max-width:390px){

.map-container{
transform:scale(0.29);
}

.map-wrap{
height:calc(100vh - 125px);
}

}

/* TABLET VIEW */
@media(min-width:701px) and (max-width:1100px){

.map-container{
transform:scale(0.72);
transform-origin:top center;
}

.map-wrap{
height:610px;
overflow:hidden;
}

}
</style>
</head>

<body>

<header>
<h1>Workshop Inventory</h1>
<nav>
<button onclick="showPage('searchPage')">Search</button>
<button onclick="showPage('addPage')">Add Part</button>
<button onclick="showPage('mapPage')">Map</button>
</nav>
</header>

<div id="searchPage" class="page active">
<input id="search" placeholder="Search parts..." oninput="searchParts()">
<div id="results"></div>
</div>

<div id="addPage" class="page">
<h2>Add New Part</h2>
<div class="add-form">
<input id="newPartName" placeholder="Part Name">
<input id="newSupplier" placeholder="Supplier">
<input id="newMPN" placeholder="Manufacturer Part Number">
<input id="newType" placeholder="Part Type">
<input id="newRack" placeholder="Rack e.g. 17">
<input id="newShelf" placeholder="Shelf e.g. 3">
<input id="newDrawer" placeholder="Drawer e.g. L1 or R5">
<input id="newQuantity" placeholder="Quantity">
<button onclick="addPart()">Add Part</button>
</div>
</div>

<div id="mapPage" class="page">
<h2>Workshop Map</h2>
<div id="selectedInfo"></div>

<div class="map-wrap">
<div class="map-container">

<div class="workshop">

<div class="box" id="rack-13" style="top:30px;left:30px;width:200px;height:55px">Rack 13</div>
<div class="box" id="rack-14" style="top:30px;left:230px;width:200px;height:55px">Rack 14</div>
<div class="box" id="rack-15" style="top:30px;left:430px;width:200px;height:55px">Rack 15</div>

<div class="box" id="rack-16" style="top:85px;left:30px;width:200px;height:55px">Rack 16</div>
<div class="box" id="rack-17" style="top:85px;left:230px;width:200px;height:55px">Rack 17</div>
<div class="box" id="rack-18" style="top:85px;left:430px;width:200px;height:55px">Rack 18</div>

<div class="box" id="right-drawer-main" style="top:190px;left:0;width:55px;height:130px;writing-mode:vertical-rl">Right Drawer</div>
<div class="box" id="left-drawer-main" style="top:350px;left:0;width:55px;height:130px;writing-mode:vertical-rl">Left Drawer</div>

<div class="box" style="top:310px;left:150px;width:280px;height:100px;background:#ddd9cf">Bench</div>
<div class="box" style="top:410px;left:320px;width:110px;height:120px;background:#ddd9cf"></div>

<div class="box" id="cupboard-1" style="bottom:40px;left:40px;width:220px;height:55px">Cupboard 1</div>
<div class="box" id="rack-19" style="bottom:40px;right:50px;width:220px;height:55px">Rack 19</div>

</div>

<div class="side-panel">

<div class="shelf-box">
<div class="shelf-title">Rack Shelves</div>
<div class="shelf" id="shelf-1">Shelf 1</div>
<div class="shelf" id="shelf-2">Shelf 2</div>
<div class="shelf" id="shelf-3">Shelf 3</div>
<div class="shelf" id="shelf-4">Shelf 4</div>
<div class="shelf" id="shelf-5">Shelf 5</div>
<div class="shelf" id="shelf-6">Shelf 6</div>
</div>

<div class="shelf-box">
<div class="shelf-title">Left Drawer</div>
<div class="drawer-row" id="left-drawer-1">L1</div>
<div class="drawer-row" id="left-drawer-2">L2</div>
<div class="drawer-row" id="left-drawer-3">L3</div>
<div class="drawer-row" id="left-drawer-4">L4</div>
<div class="drawer-row" id="left-drawer-5">L5</div>
<div class="drawer-row" id="left-drawer-6">L6</div>
<div class="drawer-row" id="left-drawer-7">L7</div>
</div>

<div class="shelf-box">
<div class="shelf-title">Right Drawer</div>
<div class="drawer-row" id="right-drawer-1">R1</div>
<div class="drawer-row" id="right-drawer-2">R2</div>
<div class="drawer-row" id="right-drawer-3">R3</div>
<div class="drawer-row" id="right-drawer-4">R4</div>
<div class="drawer-row" id="right-drawer-5">R5</div>
<div class="drawer-row" id="right-drawer-6">R6</div>
<div class="drawer-row" id="right-drawer-7">R7</div>
</div>

</div>
</div>
</div>
</div>

<script>
const API="https://snbavhdmagfufvpiocrf.supabase.co/rest/v1/parts_public";
const API_KEY="sb_publishable_PPTLw8gmtTmpbaKq_uP07Q_nWmTYSjt";

let allParts=[];

function showPage(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

async function loadParts(){
const response=await fetch(API,{headers:{apikey:API_KEY,Authorization:"Bearer "+API_KEY}});
allParts=await response.json();
showParts(allParts);
}

function searchParts(){
const search=document.getElementById("search").value.toLowerCase();
showParts(allParts.filter(part=>JSON.stringify(part).toLowerCase().includes(search)));
}

function showParts(parts){
document.getElementById("results").innerHTML=parts.map(part=>`
<div class="card">
<h2>${part.part_name||""}</h2>
<p><b>Supplier:</b> ${part.supplier_name||""}</p>
<p><b>Part Number:</b> ${part.manufacturer_part_number||""}</p>
<p><b>Type:</b> ${part.part_type||""}</p>
<p><b>Quantity:</b> ${part.quantity||""}</p>
<p class="location">
${part.rack ? "Rack " + part.rack : ""}
${part.shelf ? " | Shelf " + part.shelf : ""}
${part.drawer ? " | Drawer " + part.drawer : ""}
</p>
<button onclick='showMap(${JSON.stringify(part.rack||"")},${JSON.stringify(part.shelf||"")},${JSON.stringify(part.drawer||"")})'>View Location on Map</button>
</div>
`).join("");
}

function clearHighlights(){
document.querySelectorAll(".highlight").forEach(e=>e.classList.remove("highlight"));
}

function extractNumber(value){
const match=String(value||"").match(/\d+/);
return match ? match[0] : "";
}

function showMap(rack,shelf,drawer){
showPage("mapPage");
clearHighlights();

const rackNum=extractNumber(rack);
const shelfNum=extractNumber(shelf);
const drawerRaw=String(drawer||"").trim();
const drawerText=drawerRaw.toLowerCase();
const drawerNum=extractNumber(drawerText);

document.getElementById("selectedInfo").innerHTML=`
<div class="card">
<b>Selected Location</b><br>
${rackNum ? "Rack " + rackNum + " " : ""}
${shelfNum ? "Shelf " + shelfNum + " " : ""}
${drawerRaw ? "Drawer " + drawerRaw : ""}
</div>`;

const rackEl=document.getElementById("rack-"+rackNum);
const shelfEl=document.getElementById("shelf-"+shelfNum);

if(rackEl) rackEl.classList.add("highlight");
if(shelfEl) shelfEl.classList.add("highlight");

if(drawerText.startsWith("l") && drawerNum){
document.getElementById("left-drawer-main").classList.add("highlight");
document.getElementById("left-drawer-"+drawerNum)?.classList.add("highlight");
}

if(drawerText.startsWith("r") && drawerNum){
document.getElementById("right-drawer-main").classList.add("highlight");
document.getElementById("right-drawer-"+drawerNum)?.classList.add("highlight");
}
}

async function addPart(){
const newPart={
part_name:document.getElementById("newPartName").value,
supplier_name:document.getElementById("newSupplier").value,
manufacturer_part_number:document.getElementById("newMPN").value,
part_type:document.getElementById("newType").value,
rack:document.getElementById("newRack").value,
shelf:document.getElementById("newShelf").value,
drawer:document.getElementById("newDrawer").value,
quantity:document.getElementById("newQuantity").value
};

await fetch(API,{method:"POST",headers:{"Content-Type":"application/json",apikey:API_KEY,Authorization:"Bearer "+API_KEY},body:JSON.stringify(newPart)});
alert("Part Added");
loadParts();
showPage("searchPage");
}

loadParts();
</script>

</body>
</html>
