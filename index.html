<!DOCTYPE html>
<html>
<head>
  <title>STT Parts Inventory</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#0b0b0b;
      color:white;
    }

    .topbar{
      background:#b30000;
      padding:20px;
      display:flex;
      gap:15px;
      align-items:center;
      flex-wrap:wrap;
    }

    .topbar h1{
      margin:0;
      margin-right:auto;
    }

    button{
      background:#ff1a1a;
      border:none;
      color:white;
      padding:12px 18px;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      background:#ff4d4d;
    }

    .page{
      display:none;
      padding:20px;
    }

    .active{
      display:block;
    }

    input, textarea{
      width:100%;
      padding:15px;
      margin-bottom:15px;
      border-radius:8px;
      border:none;
      font-size:18px;
      background:#1a1a1a;
      color:white;
    }

    .card{
      background:#151515;
      border-left:5px solid #ff1a1a;
      padding:20px;
      margin-bottom:15px;
      border-radius:10px;
    }

    .title{
      font-size:24px;
      font-weight:bold;
      color:#ff4d4d;
      margin-bottom:10px;
    }

    .location{
      color:#ff9999;
      font-weight:bold;
      margin-top:10px;
    }

    .mapBox{
      background:#151515;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
      border-left:5px solid red;
    }

  </style>
</head>

<body>

<div class="topbar">
  <h1>STT Parts Inventory</h1>

  <button onclick="showPage('searchPage')">
    Search Parts
  </button>

  <button onclick="showPage('addPage')">
    Add New Part
  </button>

  <button onclick="showPage('mapPage')">
    Shelf Map
  </button>
</div>

<!-- SEARCH PAGE -->

<div id="searchPage" class="page active">

  <h2>Search Parts</h2>

  <input
    type="text"
    id="search"
    placeholder="Search by part name, supplier, MPN, type..."
  >

  <div id="results"></div>

</div>

<!-- ADD PAGE -->

<div id="addPage" class="page">

  <h2>Add New Part</h2>

  <input id="part_name" placeholder="Part Name">
  <input id="supplier_name" placeholder="Supplier Name">
  <input id="manufacturer_part_number" placeholder="Manufacturer Part Number">
  <input id="part_type" placeholder="Part Type">
  <input id="rack" placeholder="Rack">
  <input id="shelf" placeholder="Shelf">
  <input id="drawer" placeholder="Drawer">
  <input id="quantity" placeholder="Quantity">
  <textarea id="description" placeholder="Description"></textarea>

  <button onclick="addPart()">
    Save Part
  </button>

  <div id="saveMessage"></div>

</div>

<!-- MAP PAGE -->

<div id="mapPage" class="page">

  <h2>Shelf Map</h2>

  <div id="mapResults"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL =
"https://snbavhdmagfufvpiocrf.supabase.co"

const SUPABASE_KEY =
"YOUR_ANON_KEY_HERE"

const client =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
)

let allParts = []

async function loadParts(){

  const { data, error } = await client
    .from("parts_public")
    .select("*")
    .limit(1000)

  if(error){
    document.getElementById("results").innerHTML =
      "<h2 style='color:red'>ERROR: "
      + JSON.stringify(error)
      + "</h2>"

    return
  }

  allParts = data || []

  showParts(allParts)

  showMap()
}

function showParts(parts){

  document.getElementById("results").innerHTML =
    parts.map(part => `

      <div class="card">

        <div class="title">
          ${part.part_name || ""}
        </div>

        <b>Supplier:</b>
        ${part.supplier_name || ""}

        <br><br>

        <b>Manufacturer Part Number:</b>
        ${part.manufacturer_part_number || ""}

        <br><br>

        <b>Part Type:</b>
        ${part.part_type || ""}

        <br><br>

        <b>Quantity:</b>
        ${part.quantity || ""}

        <br><br>

        <b>Description:</b>
        ${part.description || ""}

        <div class="location">

          ${part.rack ? "Rack: " + part.rack : ""}

          ${part.shelf ? " | Shelf: " + part.shelf : ""}

          ${part.drawer ? " | Drawer: " + part.drawer : ""}

        </div>

      </div>

    `).join("")
}

document.getElementById("search")
.addEventListener("input", function(){

  let value =
    this.value.toLowerCase()

  let filtered =
    allParts.filter(part =>

      (part.part_name || "")
      .toLowerCase()
      .includes(value)

      ||

      (part.supplier_name || "")
      .toLowerCase()
      .includes(value)

      ||

      (part.manufacturer_part_number || "")
      .toLowerCase()
      .includes(value)

      ||

      (part.part_type || "")
      .toLowerCase()
      .includes(value)

    )

  showParts(filtered)

})

async function addPart(){

  const newPart = {

    part_name:
      document.getElementById("part_name").value,

    supplier_name:
      document.getElementById("supplier_name").value,

    manufacturer_part_number:
      document.getElementById("manufacturer_part_number").value,

    part_type:
      document.getElementById("part_type").value,

    rack:
      document.getElementById("rack").value,

    shelf:
      document.getElementById("shelf").value,

    drawer:
      document.getElementById("drawer").value,

    quantity:
      document.getElementById("quantity").value,

    description:
      document.getElementById("description").value

  }

  const { error } = await client
    .from("Parts")
    .insert([newPart])

  if(error){

    document.getElementById("saveMessage").innerHTML =
      "<h3 style='color:red'>"
      + error.message
      + "</h3>"

    return
  }

  document.getElementById("saveMessage").innerHTML =
    "<h3 style='color:lightgreen'>Part Added Successfully</h3>"

  loadParts()
}

function showPage(pageId){

  document
    .querySelectorAll(".page")
    .forEach(page => {
      page.classList.remove("active")
    })

  document
    .getElementById(pageId)
    .classList.add("active")
}

function showMap(){

  let grouped = {}

  allParts.forEach(part => {

    let rack = part.rack || ""
    let shelf = part.shelf || ""
    let drawer = part.drawer || ""

    let locationParts = []

    if(rack)
      locationParts.push("Rack " + rack)

    if(shelf)
      locationParts.push("Shelf " + shelf)

    if(drawer)
      locationParts.push("Drawer " + drawer)

    if(locationParts.length === 0)
      return

    let key = locationParts.join(" | ")

    if(!grouped[key]){
      grouped[key] = []
    }

    grouped[key].push(part.part_name)

  })

  let html = ""

  Object.keys(grouped)
    .sort()
    .forEach(location => {

      html += `

        <div class="mapBox">

          <h3>${location}</h3>

          ${grouped[location]
            .map(name => "• " + name)
            .join("<br>")}

        </div>

      `
    })

  document.getElementById("mapResults").innerHTML =
    html
}

loadParts()

</script>

</body>
</html>
