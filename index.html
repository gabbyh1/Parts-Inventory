<!DOCTYPE html>
<html>
<head>
<title>Parts Inventory</title>

<style>

body{
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  margin:0;
  padding:20px;
}

h1{
  font-size:60px;
  margin-bottom:20px;
}

h2{
  margin-top:40px;
}

input{
  width:100%;
  padding:18px;
  margin-bottom:15px;
  border:none;
  border-radius:12px;
  font-size:20px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:18px;
  border:none;
  border-radius:12px;
  background:#f5a623;
  color:black;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.part{
  background:#1b1b1b;
  padding:20px;
  margin-top:20px;
  border-radius:15px;
  border-left:6px solid #f5a623;
}

.part b{
  font-size:26px;
}

.location{
  color:#f5a623;
  font-weight:bold;
  margin-top:10px;
}

.quantity{
  margin-top:8px;
  color:#66ff99;
}

.small{
  color:#bbbbbb;
  margin-top:5px;
}

#error{
  color:#ff8080;
  font-size:24px;
  margin-top:20px;
}

</style>

</head>

<body>

<h1>Parts Search</h1>

<h2>Add New Part</h2>

<input id="newPartName" placeholder="Part Name">

<input id="newSupplier" placeholder="Supplier Name">

<input id="newMPN" placeholder="Manufacturer Part Number">

<input id="newType" placeholder="Part Type">

<input id="newRack" placeholder="Rack">

<input id="newShelf" placeholder="Shelf">

<input id="newQuantity" placeholder="Quantity">

<button onclick="addPart()">Add Part</button>

<h2>Search Inventory</h2>

<input id="search" placeholder="Search parts...">

<div id="error"></div>

<div id="results"></div>

<script>

const SUPABASE_URL = "https://snbavhdmagfufvpiocrf.supabase.co/rest/v1/";

const SUPABASE_KEY = "sb_publishable_PPTLw8gmtTmpbaKq_uP07Q_nWmTYSjt";

let allParts = [];

async function loadParts(){

  const response = await fetch(
    SUPABASE_URL + "parts_public?select=*",
    {
      headers:{
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await response.json();

  if(data.code){

    document.getElementById("error").innerHTML =
      "ERROR: " + JSON.stringify(data);

    return;
  }

  allParts = data;

  showParts(allParts);

}

document.getElementById("search").addEventListener("input", function(){

  const value = this.value.toLowerCase();

  const filtered = allParts.filter(part =>

    (part.part_name || "").toLowerCase().includes(value) ||

    (part.manufacturer_part_number || "").toLowerCase().includes(value) ||

    (part.supplier_name || "").toLowerCase().includes(value) ||

    (part.part_type || "").toLowerCase().includes(value)

  );

  showParts(filtered);

});

function showParts(parts){

  document.getElementById("results").innerHTML =

    parts.map(part => `

      <div class="part">

        <b>${part.part_name || ""}</b>

        <div class="small">
          ${part.manufacturer_part_number || ""}
        </div>

        <div class="small">
          ${part.supplier_name || ""}
        </div>

        <div class="small">
          ${part.part_type || ""}
        </div>

        <div class="location">
          Rack: ${part.rack || "-"} |
          Shelf: ${part.shelf || "-"}
        </div>

        <div class="quantity">
          Quantity: ${part.quantity || "0"}
        </div>

      </div>

    `).join("");

}

async function addPart(){

  const newPart = {

    "Part Name":
      document.getElementById("newPartName").value,

    "Supplier Name":
      document.getElementById("newSupplier").value,

    "Manufacturer Part Number":
      document.getElementById("newMPN").value,

    "Part Type":
      document.getElementById("newType").value,

    "Rack":
      document.getElementById("newRack").value,

    "Shelf":
      document.getElementById("newShelf").value,

    "Quantity":
      document.getElementById("newQuantity").value

  };

  const response = await fetch(

    SUPABASE_URL + "Parts",

    {
      method:"POST",

      headers:{
        apikey: SUPABASE_KEY,
        Authorization:"Bearer " + SUPABASE_KEY,
        "Content-Type":"application/json",
        Prefer:"return=minimal"
      },

      body: JSON.stringify(newPart)

    }

  );

  if(response.ok){

    alert("Part added successfully");

    loadParts();

  }else{

    const error = await response.text();

    alert(error);

  }

}

loadParts();

</script>

</body>
</html>
