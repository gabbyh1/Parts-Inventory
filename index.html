<!DOCTYPE html>
<html>
<head>
  <title>Parts Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      background:#000;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    h1{
      font-size:64px;
    }

    input{
      width:100%;
      padding:25px;
      font-size:28px;
      border:none;
      margin-bottom:30px;
    }

    .part{
      background:#1a1a1a;
      padding:20px;
      margin-bottom:15px;
      border-radius:10px;
      font-size:22px;
    }

    .error{
      color:#ff7b7b;
      font-size:28px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h1>Parts Search</h1>

<input id="search" placeholder="Search parts...">

<div id="results">Loading...</div>

<script>

const SUPABASE_URL = "https://snbavhdmagfufvpiocrf.supabase.co";

const SUPABASE_KEY = "sb_publishable_PPTLw8gmtTmpbaKq_uP07Q_nWmTYSjt";

let allParts = [];

async function loadParts() {

  try {

    const response = await fetch(
      "https://snbavhdmagfufvpiocrf.supabase.co/rest/v1/parts_public",
      {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY,
          "Content-Type": "application/json"
        }
      }
    );

    const text = await response.text();

    if(!response.ok){
      document.getElementById("results").innerHTML =
      '<div class="error">ERROR: ' + text + '</div>';
      return;
    }

    allParts = JSON.parse(text);

    if(allParts.length === 0){
      document.getElementById("results").innerHTML =
      '<div class="error">NO DATA FOUND</div>';
      return;
    }

    showParts(allParts);

  } catch(err){

    document.getElementById("results").innerHTML =
    '<div class="error">' + err + '</div>';

  }

}

function showParts(parts){

  document.getElementById("results").innerHTML =
  parts.map(part => `
    <div class="part">
      <b>${part.part_name || ""}</b><br><br>

      Supplier: ${part.supplier_name || ""}<br>

      Part Number: ${part.manufacturer_part_number || ""}<br>

      Type: ${part.part_type || ""}
    </div>
  `).join("");

}

document.getElementById("search").addEventListener("input", function(e){

  const search = e.target.value.toLowerCase();

  const filtered = allParts.filter(part =>

    JSON.stringify(part).toLowerCase().includes(search)

  );

  showParts(filtered);

});

loadParts();

</script>

</body>
</html>
