<!DOCTYPE html>
<html>
<head>
  <title>Parts Inventory Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      margin:0;
      background:#0d0f14;
      color:white;
      font-family:Arial, sans-serif;
    }

    .header{
      background:#151922;
      padding:25px;
      border-bottom:4px solid #f5a623;
    }

    h1{
      margin:0;
      font-size:42px;
    }

    .subtitle{
      color:#b5b5b5;
      margin-top:8px;
      font-size:16px;
    }

    .container{
      padding:20px;
      max-width:900px;
      margin:auto;
    }

    input{
      width:100%;
      box-sizing:border-box;
      padding:18px;
      font-size:22px;
      border-radius:12px;
      border:2px solid #333;
      margin-bottom:20px;
    }

    .part{
      background:#1b1f29;
      padding:18px;
      margin-bottom:15px;
      border-radius:14px;
      border-left:6px solid #f5a623;
    }

    .part-name{
      font-size:24px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .location{
      background:#f5a623;
      color:#111;
      padding:12px;
      border-radius:10px;
      font-size:20px;
      font-weight:bold;
      margin:12px 0;
    }

    .details{
      color:#ddd;
      line-height:1.6;
      font-size:16px;
    }

    .error{
      color:#ff7b7b;
      font-size:22px;
      font-weight:bold;
    }

    .count{
      color:#aaa;
      margin-bottom:15px;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>Parts Inventory</h1>
  <div class="subtitle">Search by part name, supplier, part number, type, rack or shelf</div>
</div>

<div class="container">
  <input id="search" placeholder="Search parts...">
  <div id="count"></div>
  <div id="results">Loading parts...</div>
</div>

<script>

const SUPABASE_KEY = "sb_publishable_PPTLw8gmtTmpbaKq_uP07Q_nWmTYSjt";

let allParts = [];

async function loadParts() {

  try {

    const response = await fetch(
      "https://snbavhdmagfufvpiocrf.supabase.co/rest/v1/parts_public",
      {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY,
          "Content-Type": "application/json"
        }
      }
    );

    const text = await response.text();

    if(!response.ok){
      document.getElementById("results").innerHTML =
      '<div class="error">ERROR: ' + text + '</div>';
      return;
    }

    allParts = JSON.parse(text);

    if(allParts.length === 0){
      document.getElementById("results").innerHTML =
      '<div class="error">NO PARTS FOUND</div>';
      return;
    }

    showParts(allParts);

  } catch(err){

    document.getElementById("results").innerHTML =
    '<div class="error">' + err + '</div>';

  }

}

function showParts(parts){

  document.getElementById("count").innerHTML =
    '<div class="count">Showing ' + parts.length + ' part(s)</div>';

  if(parts.length === 0){
    document.getElementById("results").innerHTML =
    '<div class="error">No matching parts found.</div>';
    return;
  }

  document.getElementById("results").innerHTML =
  parts.map(part => `
    <div class="part">
      <div class="part-name">${part.part_name || "Unnamed part"}</div>

      <div class="location">
        Location: Rack ${part.rack || "-"} | Shelf ${part.shelf || "-"}
      </div>

      <div class="details">
        <b>Supplier:</b> ${part.supplier_name || "-"}<br>
        <b>Part Number:</b> ${part.manufacturer_part_number || "-"}<br>
        <b>Type:</b> ${part.part_type || "-"}
      </div>
    </div>
  `).join("");

}

document.getElementById("search").addEventListener("input", function(e){

  const search = e.target.value.toLowerCase();

  const filtered = allParts.filter(part =>
    JSON.stringify(part).toLowerCase().includes(search)
  );

  showParts(filtered);

});

loadParts();

</script>

</body>
</html>
